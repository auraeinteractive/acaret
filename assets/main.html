<!DOCTYPE html>
<html>
    <head>
        <title>AIDE</title>
        <link rel="stylesheet" href="data://main.css"/>
        <script type="text/javascript" src="data://ai/conversation.js"></script>
    </head>
    <body onload="window.convos = new Conversation( { messageContainer: document.querySelector( '.messages' ) } )">
        <div id="chat">
            <div class="messages">
            </div>
            <div class="chat">
                <textarea class="prompt" onkeydown="if( event.which == 13 ){ let t = this.value; this.value = ''; window.convos.sendMessage(t); event.stopPropagation(); event.preventDefault(); }"></textarea>
            </div>
        </div>
        
        <div id="debug"></div>
        
        <pre id="editor"></pre>

        <script src="data://libs/ace/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
        <script>
            var editor = ace.edit("editor");
            editor.setTheme("ace/theme/twilight");
            editor.session.setMode("ace/mode/javascript");
        </script>
    </body>
</html>
