<!DOCTYPE html>
<html>
    <head>
        <title>AIDE</title>
        <link rel="stylesheet" href="main.css"/>
        <!-- Link to Ace's CSS -->
        <style type="text/css" media="screen">
            body {
                overflow: hidden;
            }

            #editor {
                margin: 0;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
            }
        </style>
    </head>
    <body>
        <h1>
            Hello world there!
        </h1>
        <p>
            More cool stuff soon!
        </p>
        
        <pre id="editor">function foo(items) {
            var i;
            for (i = 0; i &lt; items.length; i++) {
                alert("Ace Rocks " + items[i]);
            }
        }</pre>

        <script src="data://libs/ace/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
        <script>
            var editor = ace.edit("editor");
            editor.setTheme("ace/theme/twilight");
            editor.session.setMode("ace/mode/javascript");
        </script>
    </body>
</html>
