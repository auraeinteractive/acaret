<!DOCTYPE html>
<html>
    <head>
        <title>AIDE</title>
        <link rel="stylesheet" href="data://main.css"/>
        <script type="text/javascript" src="data://ai/conversation.js"></script>
        <script type="text/javascript" src="data://ai/gui-logic.js"></script>
    </head>
    <body onload="window.convos = new Conversation( { messageContainer: document.querySelector( '.messages' ) } ); initializeGUI()">
        <div id="leftbar">
            <button class="button btn-editor active" id="tab_editor"><span>Editor</span></button>
            <button class="button btn-contexts" id="tab_contexts"><span>Contexts</span></button>
            <button class="button btn-flow-nodes" id="tab_flow-nodes"><span>Flow nodes</span></button>
            <button class="button btn-ai-tools" id="tab_ai-tools"><span>AI tools</span></button>
            <button class="button btn-version-control" id="tab_version-control"><span>Version control</span></button>
            <button class="button btn-settings" id="tab_settings"><span>Settings</span></button>
        </div>
        <div id="topbar">
        </div>
        <div id="bottombar"></div>
        <div id="rightbar"></div>
        <div id="chat">
            <div class="messages">
            </div>
            <div class="chat">
                <textarea class="prompt" onkeydown="if( event.which == 13 ){ let t = this.value; this.value = ''; window.convos.sendMessage(t); event.stopPropagation(); event.preventDefault(); }"></textarea>
            </div>
        </div>
        
        <div id="debug"></div>
        
        <div id="pages">
            <div class="page active" id="page_editor">
                <pre id="editor"></pre>
            </div>
            <div class="page" id="page_contexts">
                Hello world contexts
            </div>
            <div class="page" id="page_flow-nodes">
                nodes
            </div>
            <div class="page" id="page_ai-tools">
                ai tools
            </div>
            <div class="page" id="page_version-control">
                version control
            </div>
            <div class="page" id="page_settings">
                settings
            </div>
            
        </div>

        <script src="data://libs/ace/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
        <script>
            var editor = ace.edit("editor");
            editor.setTheme("ace/theme/twilight");
            editor.session.setMode("ace/mode/javascript");
            editor.setOptions({
                fontFamily: "tahoma",
                fontSize: "15px"
            });
        </script>
    </body>
</html>
