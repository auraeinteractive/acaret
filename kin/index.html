<!DOCTYPE html>
<html>
    <head>
        <title>Acaret</title>
        <link rel="icon" href="icon.png" type="image/png" />
        <link rel="stylesheet" href="styles/main.css"/>
        <link rel="stylesheet" href="../kin_ui/theme/kin-ui.css"/>
    </head>
    <body>
        <div id="overlay"></div>
        <div id="leftbar">
            <button class="button btn-editor active" id="tab_editor"><span>Editor</span></button>
            <button class="button btn-project" id="tab_project"><span>Project</span></button>
        </div>
        <div id="topbar">
            <div id="top_toolbar"></div>
            <div id="right_panel_header">
                <div></div><div></div>
            </div>
        </div>
        <div id="bottombar">
            <div class="bottom-info"></div>
            <button class="button btn-output" id="output_toggle" type="button">Output</button>
        </div>
        <div id="rightbar">
            <button class="button btn-folders active" id="tab_folders"><span>Folders</span></button>
            <button class="button btn-translations" id="tab_translations"><span>Translations</span></button>
            <button class="button btn-tags" id="tab_tags"><span>Tags</span></button>
            <button class="button btn-navigator" id="tab_navigator"><span>Navigator</span></button>
        </div>
        <div id="right-panel-resizer" title="Drag to resize"></div>
        <div id="rightpages">
            <div class="page active" id="page_folders">
            </div>
            <div class="page" id="page_translations">
            </div>
            <div class="page" id="page_tags">
            </div>
            <div class="page" id="page_navigator">
            </div>
        </div>
        
        <div id="output_panel" aria-live="polite">
            <div class="output-header"><strong>KinDOS Output</strong><span class="output-status"></span><button type="button" class="output-clear">Clear</button><button type="button" class="output-close" aria-label="Close output">×</button></div>
            <pre class="output-command"></pre><pre class="output-stdout"></pre><pre class="output-stderr"></pre>
        </div>
        
        <div id="page_preview"></div>
        
        <div id="pages">
            <div class="page active" id="page_editor" toolbar="editor">
            </div>
            <div class="page" id="page_project" toolbar="project">
                <div class="project-overview">
                    <div class="project-actions"><button type="button" id="project_new">New from template…</button><button type="button" id="project_open">Open project…</button><button type="button" id="project_save">Save project</button></div>
                    <dl><dt>Name</dt><dd><input id="p-name" type="text" value=""/></dd><dt>Type</dt><dd id="p-kind">No project</dd><dt>Root</dt><dd id="p-root">—</dd><dt>Entry</dt><dd id="p-entry">—</dd></dl>
                </div>
            </div>
        </div>
    </body>
</html>
